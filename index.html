<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎲 我的桌遊收藏清單</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary: #4f46e5;
            --primary-light: #e0e7ff;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 10px 30px rgba(79, 70, 229, 0.08);
            --shadow-hover: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        /* 固定在頂部的精美 Header */
        header {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
            padding: 20px;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, #4f46e5, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 搜尋框 */
        .filter-container {
            flex: 1;
            max-width: 450px;
            min-width: 280px;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            border: 1.5px solid #e2e8f0;
            border-radius: 30px;
            font-size: 15px;
            outline: none;
            background-color: #f8fafc;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: var(--primary);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px var(--primary-light);
        }

        /* 主網格區塊 */
        main {
            max-width: 1240px;
            margin: 40px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px;
        }

        /* 桌遊卡片 */
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(226, 232, 240, 0.5);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
            border-color: rgba(79, 70, 229, 0.2);
        }

        /* 圖片容器 */
        .img-container {
            width: 100%;
            height: 240px;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            border-bottom: 1px solid #f1f5f9;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 16px;
            box-sizing: border-box;
            transition: transform 0.5s ease;
        }

        .card:hover img {
            transform: scale(1.04);
        }

        /* 卡片文字與資訊 */
        .card-info {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.4;
            margin: 0;
            color: var(--text-main);
        }

        /* 膠囊標籤 */
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            font-size: 12px;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .tag.players { background-color: #f0fdf4; color: #16a34a; }
        .tag.time { background-color: #fff7ed; color: #ea580c; }
        .tag.type { background-color: #f5f3ff; color: #7c3aed; }

        /* ✨ 遊戲簡介：核心修改區塊 ✨ */
        .card-desc {
            font-size: 13.5px;
            color: var(--text-muted);
            line-height: 1.5;
            border-top: 1px dashed #e2e8f0;
            padding-top: 0;
            margin-top: 0;
            
            /* 預設隱藏狀態與平滑動畫設定 */
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.16, 1, 0.3, 1), 
                        opacity 0.3s ease, 
                        padding 0.4s ease, 
                        margin 0.4s ease;
        }

        /* ✨ 當滑鼠停在卡片上時 (.card:hover)，顯示簡介 ✨ */
        .card:hover .card-desc {
            max-height: 120px; /* 給予足夠的展開高度 */
            opacity: 1;
            padding-top: 12px;
            margin-top: 4px;
            
            display: -webkit-box;
            -webkit-line-clamp: 4; /* 展開後最多顯示 4 行 */
            -webkit-box-orient: vertical;
        }

        /* 狀態訊息 */
        .status-msg {
            text-align: center;
            font-size: 16px;
            font-weight: 500;
            color: var(--text-muted);
            grid-column: 1 / -1;
            padding: 80px 0;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <h1>🎲 我的桌遊收藏</h1>
            <div class="filter-container">
                <input type="text" id="searchInput" class="search-input" placeholder="搜尋名稱、類型或簡介...">
            </div>
        </div>
    </header>

    <main>
        <div class="grid" id="bgList">
            <div class="status-msg">✨ 正在從雲端載入您的收藏...</div>
        </div>
    </main>

    <script>
        const sheetId = '1GVdpagEiRHkQhaBhlCbPW5_Gg1tVAUdJnenyO2Ql35s';
        let allGames = []; 

        window.handleGoogleData = function(response) {
            try {
                const rows = response.table.rows;
                
                allGames = rows.map(row => {
                    const cells = row.c;
                    return {
                        name: cells[0] ? cells[0].v : '',
                        image: cells[1] ? cells[1].v : '',
                        players: cells[2] ? cells[2].v : '',
                        playtime: cells[3] ? cells[3].v : '',
                        gametype: cells[4] ? cells[4].v : '',
                        description: cells[5] ? cells[5].v : ''
                    };
                }).filter(game => game.name && game.name.toString().trim() !== '');

                renderGames(allGames);
            } catch(e) {
                document.getElementById('bgList').innerHTML = `<div class="status-msg" style="color:#ef4444;">❌ 解析資料失敗：${e}</div>`;
            }
        };

        const script = document.createElement('script');
        script.src = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=responseHandler:handleGoogleData&headers=1`;
        document.body.appendChild(script);

        function renderGames(games) {
            const listEl = document.getElementById('bgList');
            listEl.innerHTML = '';

            if (games.length === 0) {
                listEl.innerHTML = '<div class="status-msg">📦 找不到符合條件的桌遊</div>';
                return;
            }

            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'card';

                const displayImg = game.image ? game.image : 'https://via.placeholder.com/260x240?text=No+Image';

                let tagsHtml = '';
                if (game.players) tagsHtml += `<span class="tag players">👥 ${game.players}</span>`;
                if (game.playtime) tagsHtml += `<span class="tag time">⏳ ${game.playtime}</span>`;
                if (game.gametype) tagsHtml += `<span class="tag type">🧩 ${game.gametype}</span>`;

                let descHtml = game.description ? `<div class="card-desc">${game.description}</div>` : '';

                card.innerHTML = `
                    <div class="img-container">
                        <img src="${displayImg}" alt="${game.name}" onerror="this.onerror=null; this.src='https://via.placeholder.com/260x240?text=No+Image';">
                    </div>
                    <div class="card-info">
                        <h2 class="card-title">${game.name}</h2>
                        ${tagsHtml ? `<div class="tags-container">${tagsHtml}</div>` : ''}
                        ${descHtml}
                    </div>
                `;
                listEl.appendChild(card);
            });
        }

        document.getElementById('searchInput').addEventListener('input', function(e) {
            const keyword = e.target.value.toLowerCase().trim();
            const filtered = allGames.filter(game => {
                const nameMatch = game.name.toString().toLowerCase().includes(keyword);
                const typeMatch = game.gametype ? game.gametype.toString().toLowerCase().includes(keyword) : false;
                const descMatch = game.description ? game.description.toString().toLowerCase().includes(keyword) : false;
                return nameMatch || typeMatch || descMatch;
            });
            renderGames(filtered);
        });
    </script>
</body>
</html>
